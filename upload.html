<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Upload รูปภาพ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 20px 16px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .sub   { font-size: 13px; color: #888; }

  input[type=file] { display: none; }

  .btn {
    display: block; width: 100%; padding: 15px;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600;
    cursor: pointer; text-align: center;
    margin-top: 10px;
  }
  .btn-pick   { background: #1877f2; color: #fff; }
  .btn-upload { background: #28a745; color: #fff; display: none; }
  .btn-upload:disabled { background: #aaa; }

  .preview-wrap {
    margin-top: 14px; border-radius: 12px;
    overflow: hidden; display: none;
    border: 1px solid #eee;
  }
  .preview-wrap img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
  .preview-name { padding: 8px 12px; font-size: 12px; color: #888; background: #fafafa; }

  .status-box {
    padding: 12px 14px; border-radius: 10px;
    font-size: 14px; margin-top: 10px;
    background: #f8f9fa; color: #555;
    border-left: 3px solid #ccc;
    min-height: 44px; display: flex; align-items: center;
  }
  .status-box.ok      { background: #e8f5e9; border-color: #28a745; color: #1b5e20; }
  .status-box.err     { background: #fdecea; border-color: #e53935; color: #b71c1c; }
  .status-box.loading { background: #e3f2fd; border-color: #1877f2; color: #0d47a1; }

  .result-wrap { display: none; }
  .result-wrap img { width: 100%; border-radius: 12px; display: block; }
  .url-box {
    margin-top: 10px; padding: 10px 12px;
    background: #f0f4ff; border-radius: 10px;
    font-size: 11px; color: #1565c0;
    word-break: break-all; line-height: 1.5;
  }
  .progress-bar {
    height: 4px; background: #e0e0e0; border-radius: 4px;
    overflow: hidden; margin-top: 10px; display: none;
  }
  .progress-fill {
    height: 100%; background: #1877f2; width: 0%;
    transition: width 0.3s; border-radius: 4px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="title">อัปโหลดรูปภาพ</div>
  <div class="sub">เลือกรูปจาก Gallery แล้ว Upload ขึ้น Cloudinary</div>

  <input type="file" id="fileInput" accept="image/*">

  <button class="btn btn-pick"
          onclick="document.getElementById('fileInput').click()">
    เลือกรูปจาก Gallery
  </button>

  <div class="preview-wrap" id="previewWrap">
    <img id="preview" src="">
    <div class="preview-name" id="previewName"></div>
  </div>

  <button class="btn btn-upload" id="btnUpload" onclick="doUpload()">
    Upload ขึ้น Cloudinary
  </button>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="status-box" id="statusBox">รอเลือกรูป...</div>
</div>

<div class="card result-wrap" id="resultWrap">
  <img id="resultImg" src="">
  <div class="url-box" id="urlBox"></div>
</div>

<script>
var CLOUD  = 'dmu0r7cgl';
var PRESET = 'Slip-StorageURL';
var selectedFile = null;

function setStatus(msg, type) {
  var el = document.getElementById('statusBox');
  el.textContent = msg;
  el.className = 'status-box ' + (type || '');
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  selectedFile = e.target.files[0];
  if (!selectedFile) return;

  var reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('preview').src = ev.target.result;
    document.getElementById('previewWrap').style.display = 'block';
  };
  reader.readAsDataURL(selectedFile);

  document.getElementById('previewName').textContent =
    selectedFile.name + ' — ' + (selectedFile.size / 1024).toFixed(0) + ' KB';
  document.getElementById('btnUpload').style.display = 'block';
  setStatus('เลือกรูปแล้ว — กด Upload ได้เลย');
});

function doUpload() {
  if (!selectedFile) return;

  var btn = document.getElementById('btnUpload');
  var bar = document.getElementById('progressBar');
  var fill = document.getElementById('progressFill');

  btn.disabled = true;
  bar.style.display = 'block';
  fill.style.width = '5%';
  setStatus('กำลัง upload...', 'loading');

  var fd = new FormData();
  fd.append('file', selectedFile);
  fd.append('upload_preset', PRESET);

  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.cloudinary.com/v1_1/' + CLOUD + '/image/upload');

  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
      fill.style.width = Math.round((e.loaded / e.total) * 90) + '%';
    }
  };

  xhr.onload = function() {
    fill.style.width = '100%';
    btn.disabled = false;
    setTimeout(function() { bar.style.display = 'none'; }, 800);

    try {
      var json = JSON.parse(xhr.responseText);
      if (json.secure_url) {
        setStatus('Upload สำเร็จ!', 'ok');
        document.getElementById('resultImg').src = json.secure_url;
        document.getElementById('urlBox').textContent = json.secure_url;
        document.getElementById('resultWrap').style.display = 'block';
        sendToApp(json.secure_url);
      } else {
        setStatus('ERROR: ' + (json.error && json.error.message || JSON.stringify(json)), 'err');
        sendToApp('ERROR:cloudinary_error');
      }
    } catch(e) {
      setStatus('ERROR: parse failed', 'err');
      sendToApp('ERROR:parse_failed');
    }
  };

  xhr.onerror = function() {
    btn.disabled = false;
    bar.style.display = 'none';
    setStatus('ERROR: network error', 'err');
    sendToApp('ERROR:network');
  };

  xhr.send(fd);
}

function sendToApp(value) {
  try { AppInventor.setWebViewString(value); } catch(e) {}
}
</script>
</body>
</html>
